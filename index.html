<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsicoTEAM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
:root{
  --color-background-primary:#fff;
  --color-background-secondary:#f5f7fa;
  --color-text-primary:#1a1a2e;
  --color-text-secondary:#6b7280;
  --color-border-secondary:#d1d5db;
  --color-border-tertiary:#e5e7eb;
  --border-radius-md:6px;
  --border-radius-lg:10px;
}
html,body{min-height:100%;background:#f0f4f8;margin:0}
body{display:flex;align-items:flex-start;justify-content:center;padding:0}

#save-indicator{position:fixed;top:12px;right:16px;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;z-index:200;transition:opacity .4s}
#save-indicator.ok{background:#d1fae5;color:#065f46}
#save-indicator.saving{background:#fef9c3;color:#713f12}
#save-indicator.err{background:#fee2e2;color:#991b1b}
#save-indicator.hidden{opacity:0;pointer-events:none}

.app{display:flex;width:100%;min-height:100vh;background:var(--color-background-primary)}
.sidebar{width:210px;flex-shrink:0;border-right:0.5px solid var(--color-border-tertiary);background:#1a1a2e;display:flex;flex-direction:column;min-height:100vh;overflow-y:auto;position:sticky;top:0;max-height:100vh}
.sidebar-logo{border-bottom:1px solid rgba(255,255,255,.15);background:#000;padding:8px}
.sidebar-logo img{width:100%;display:block}
.sidebar-section{padding:8px 10px 4px;font-size:10px;color:rgba(0,163,224,.8);font-weight:600;letter-spacing:.07em;margin-top:4px}
.nav-btn{background:none;border:none;text-align:left;padding:8px 12px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:7px;width:100%}
.nav-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-btn.active{background:rgba(0,163,224,.3);color:#fff;font-weight:500}
.agenda-item{display:flex;align-items:center;gap:7px;padding:5px 12px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.8)}
.agenda-item:hover{background:rgba(255,255,255,.1)}
.agenda-item.active{background:rgba(255,255,255,.18);color:#fff}
.agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:10px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:#fff}
.topbar h2{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.topbar-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{padding:6px 12px;border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;font-weight:500;border:none;white-space:nowrap}
.btn-blue{background:#00a3e0;color:#fff}.btn-blue:hover{background:#0090c5}
.btn-green{background:#2e7d32;color:#fff}.btn-green:hover{background:#1b5e20}
.btn-outline{background:none;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}.btn-outline:hover{background:var(--color-background-secondary)}
.btn-red{background:#E24B4A;color:#fff}.btn-red:hover{background:#c0392b}
.btn-orange{background:#e65100;color:#fff}.btn-orange:hover{background:#bf360c}
.content{flex:1;padding:14px}

/* LEGEND */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* TABLE */
.wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;min-width:700px;font-size:11px}
th,td{border:1px solid #ccc;padding:0;text-align:center;vertical-align:middle;height:38px}
th{background:#006fa8;color:#fff;font-weight:500;font-size:11px;padding:5px 3px;position:sticky;top:0;z-index:5}
th.hora-col{width:76px}
td.hora-cell{background:#e0f4fb;color:#005f80;font-weight:500;font-size:11px;width:76px}
td.almoco{background:#00bcd4;color:#003a42;font-weight:500;font-size:11px}
td.reuniao{background:#7b1fa2;color:#fff;font-weight:500;font-size:11px}
td.bloqueado{background:#eeeeee;cursor:default}
td.vazio{background:#fff;cursor:pointer}
td.vazio:hover{background:#f0f7ff}

/* Células de paciente por convênio */
td.pac-unimed{background:#1b5e20;color:#fff;cursor:pointer;font-size:11px;padding:2px 3px}
td.pac-intercambio{background:#a5d6a7;color:#1b2e1c;cursor:pointer;font-size:11px;padding:2px 3px}
td.pac-particular{background:#1565c0;color:#fff;cursor:pointer;font-size:11px;padding:2px 3px}
td.pac-falta{background:#c62828;color:#fff;cursor:pointer;font-size:11px;padding:2px 3px}
td.pac-unimed:hover,td.pac-intercambio:hover,td.pac-particular:hover,td.pac-falta:hover{filter:brightness(.88)}
td.paciente-cell span.conv{display:block;font-size:9px;opacity:.85}
td.paciente-cell span.obs-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;margin-left:3px;vertical-align:middle;opacity:.8}

/* PATIENTS */
.search-bar{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;background:#fff;color:var(--color-text-primary);margin-bottom:10px}
.pat-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:6px;background:#fff;display:flex;align-items:center;gap:10px;cursor:pointer}
.pat-card:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.pat-info h4{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.pat-info p{font-size:11px;color:var(--color-text-secondary)}
.conv-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;margin-left:auto;flex-shrink:0}

/* MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;width:400px;max-width:95vw;max-height:85vh;overflow-y:auto;margin-bottom:20px}
.modal h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--color-text-primary)}
.form-group{margin-bottom:9px}
.form-group label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 9px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;background:#fff;color:var(--color-text-primary)}
.form-group textarea{height:60px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}

/* AGENDA CARD */
.agenda-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;background:#fff}
.agenda-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}

/* HORÁRIOS EDITOR */
.slots-editor{margin-top:10px}
.slot-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--color-border-tertiary);font-size:12px}
.slot-label{width:90px;flex-shrink:0;color:var(--color-text-secondary);font-size:11px}
.slot-toggle{width:22px;height:22px;border-radius:50%;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slot-toggle.on{background:#d1fae5;color:#065f46}
.slot-toggle.off{background:#fee2e2;color:#991b1b}

.loading-screen{display:flex;align-items:center;justify-content:center;height:200px;color:var(--color-text-secondary);font-size:13px;gap:8px}

/* COLOR SWATCHES */
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:#fff;outline:2px solid #333}

/* ESPECIALIDADE GRUPO */
.esp-group-header{display:flex;align-items:center;gap:6px;padding:6px 10px 4px;cursor:pointer;user-select:none;font-size:10px;color:rgba(0,163,224,.9);font-weight:700;letter-spacing:.06em;margin-top:6px;border-top:1px solid rgba(255,255,255,.08)}
.esp-group-header:hover{background:rgba(255,255,255,.06)}
.esp-arrow{font-size:9px;transition:transform .2s;display:inline-block}
.esp-group-items{overflow:hidden;transition:max-height .25s ease}

/* ALERTAS */
.alert-banner{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;flex-direction:column;gap:0;pointer-events:none}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:12px;pointer-events:all;animation:slideDown .3s ease}
.alert-item.urgente{background:#b71c1c;color:#fff}
.alert-item.aviso{background:#e65100;color:#fff}
.alert-item.ok-alert{background:#1b5e20;color:#fff}
.alert-close{margin-left:auto;background:none;border:none;color:inherit;cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* ABAS PACIENTE */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--color-border-tertiary);margin-bottom:12px}
.tab-btn{padding:6px 14px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:#00a3e0;border-bottom-color:#00a3e0;font-weight:600}
.tab-pane{display:none}.tab-pane.active{display:block}

/* BADGE ALERTA */
.badge-alerta{display:inline-block;background:#c62828;color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;margin-left:4px;font-weight:700;vertical-align:middle}
</style>
</head>
<body>

<div id="save-indicator" class="hidden"></div>
<div id="alert-banner" class="alert-banner"></div>
<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-content"></div></div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="Logomarca_PsicoTEAM__1_.png" alt="PsicoTEAM" onerror="this.outerHTML='<div style=\'padding:12px;color:#00a3e0;font-weight:700;font-size:15px\'>PsicoTEAM</div>'">
    </div>
    <div class="sidebar-section">NAVEGAÇÃO</div>
    <button class="nav-btn active" id="nav-agenda" onclick="showPage('agenda')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M5 1v4M11 1v4M1 7h14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Agenda
    </button>
    <button class="nav-btn" id="nav-pacientes" onclick="showPage('pacientes')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M1 14c0-3 2-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M14 14c0-2-1-3.5-2-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Pacientes
    </button>
    <button class="nav-btn" id="nav-agendas" onclick="showPage('agendas')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
      Gerenciar agendas
    </button>
    <div class="sidebar-section" style="margin-top:8px">AGENDAS</div>
    <div id="sidebar-agendas"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="page-title">Carregando...</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content">
      <div class="loading-screen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        Carregando dados do servidor...
      </div>
    </div>
  </div>
</div>

<script>
const CONVS = ['Particular','Unimed','Unimed Intercâmbio']
const ESPECIALIDADES = ['Psicologia','Fonoaudiologia','Psicopedagogia','Psicomotricidade','Terapia Ocupacional','Neuropsicologia','Outro']
const SLOTS_SEG_SEX = ['07h - 08h','08h - 09h','09h - 10h','10h - 11h','11h - 12h','12h - 13h','13h - 14h','14h - 15h','15h - 16h','16h - 17h','17h - 18h','18h - 19h']
const SLOTS_SAB = ['07h - 08h','08h - 09h','09h - 10h','10h - 11h','11h - 12h']
const DIAS_LABELS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado']
const CORES = ['#1b5e20','#2e7d32','#388e3c','#1565c0','#0277bd','#6a1b9a','#880e4f','#b71c1c','#e65100','#f57f17','#004d40','#263238','#37474f','#4e342e','#00695c','#1a237e','#4527a0','#ad1457','#c62828','#283593','#00838f','#558b2f','#ef6c00','#d84315','#6d4c41','#546e7a','#00897b','#43a047','#fb8c00','#8d6e63']

let agendas = [], pacientes = []
let currentAgendaId = 1, nextPatId = 1, nextAgendaId = 1
let editingCell = null, editingPatId = null

// ─── API ──────────────────────────────────────────────────────────────────────
let saveTimer = null
const ind = document.getElementById('save-indicator')
function showInd(msg,cls){ind.textContent=msg;ind.className=cls;clearTimeout(ind._h);if(cls==='ok')ind._h=setTimeout(()=>ind.className='hidden',2500)}

async function saveData(){
  clearTimeout(saveTimer)
  saveTimer=setTimeout(async()=>{
    showInd('💾 Salvando…','saving')
    try{
      const r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agendas,pacientes,currentAgendaId,nextPatId,nextAgendaId})})
      if(!r.ok)throw new Error(r.status)
      showInd('✅ Salvo','ok')
    }catch(e){showInd('❌ Erro ao salvar','err')}
  },400)
}

async function loadData(){
  try{
    const r=await fetch('/api/data'); const j=await r.json()
    if(j.ok&&j.data){
      const d=j.data
      if(d.agendas?.length) agendas=d.agendas
      if(d.pacientes?.length) pacientes=d.pacientes
      if(d.currentAgendaId) currentAgendaId=d.currentAgendaId
      if(d.nextPatId) nextPatId=d.nextPatId
      if(d.nextAgendaId) nextAgendaId=d.nextAgendaId
    }
  }catch(e){showInd('⚠️ Sem conexão com servidor','err')}
  showPage('agenda')
  checkAlertas()
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getAgenda(){return agendas.find(a=>a.id===currentAgendaId)}

// Valor armazenado: "Nome|Convênio|obs:Observação" ou "Nome|Convênio|falta" etc
// Tipos: vazio, bloqueado, almoco:X, reuniao:X, paciente
function getType(v){
  if(!v) return 'vazio'
  if(v==='bloqueado') return 'bloqueado'
  if(v.startsWith('almoco:')) return 'almoco'
  if(v.startsWith('reuniao:')) return 'reuniao'
  return 'paciente'
}
function parsePac(v){
  // retorna {nome, conv, falta, obs}
  const parts = v.split('|')
  const nome = parts[0]||''
  const conv = parts[1]||'Unimed'
  let falta = false, obs = ''
  for(let i=2;i<parts.length;i++){
    if(parts[i]==='falta') falta=true
    else if(parts[i].startsWith('obs:')) obs=parts[i].slice(4)
  }
  return {nome,conv,falta,obs}
}
function buildPacVal(nome,conv,falta,obs){
  let v = nome+'|'+conv
  if(falta) v+='|falta'
  if(obs&&obs.trim()) v+='|obs:'+obs.trim()
  return v
}
function pacCssClass(conv,falta){
  if(falta) return 'pac-falta'
  if(conv==='Unimed Intercâmbio') return 'pac-intercambio'
  if(conv==='Particular') return 'pac-particular'
  return 'pac-unimed'
}

// ─── SIDEBAR AGENDAS AGRUPADAS ────────────────────────────────────────────────
let collapsedGroups = {}

function renderSidebarAgendas(){
  const grupos = {}
  agendas.forEach(a=>{
    const esp = a.especialidade || 'Outros'
    if(!grupos[esp]) grupos[esp]=[]
    grupos[esp].push(a)
  })
  let html=''
  Object.keys(grupos).sort().forEach(esp=>{
    const isOpen = collapsedGroups[esp] !== false // default aberto
    const arrow = isOpen ? '▼' : '▶'
    html+=`<div class="esp-group-header" onclick="toggleGroup('${esp}')">
      <span class="esp-arrow" id="arrow-${esp.replace(/\s/g,'_')}">${arrow}</span>
      <span>${esp}</span>
    </div>
    <div class="esp-group-items" id="grp-${esp.replace(/\s/g,'_')}" style="max-height:${isOpen?'600px':'0'}">
    ${grupos[esp].map(a=>`
      <div class="agenda-item${a.id===currentAgendaId?' active':''}" onclick="switchAgenda(${a.id})">
        <div class="agenda-dot" style="background:${a.cor||'#1b5e20'}"></div>
        <span style="flex:1">${a.nome}</span>
      </div>`).join('')}
    </div>`
  })
  document.getElementById('sidebar-agendas').innerHTML=html
}

function toggleGroup(esp){
  const key=esp.replace(/\s/g,'_')
  const grp=document.getElementById('grp-'+key)
  const arrow=document.getElementById('arrow-'+key)
  const isOpen=grp.style.maxHeight!=='0px'&&grp.style.maxHeight!=='0'
  grp.style.maxHeight=isOpen?'0':'600px'
  arrow.textContent=isOpen?'▶':'▼'
  collapsedGroups[esp]=!isOpen
}

// ─── ALERTAS DE GUIAS E LAUDOS ────────────────────────────────────────────────
function diasAte(dateStr){
  if(!dateStr) return null
  const hoje=new Date(); hoje.setHours(0,0,0,0)
  const d=new Date(dateStr); d.setHours(0,0,0,0)
  return Math.round((d-hoje)/(1000*60*60*24))
}

function checkAlertas(){
  const banner=document.getElementById('alert-banner')
  banner.innerHTML=''
  const alertas=[]
  pacientes.forEach(p=>{
    // Guia
    if(p.guiaVenc){
      const d=diasAte(p.guiaVenc)
      if(d!==null && d<=30){
        const cls=d<=7?'urgente':d<=15?'aviso':'ok-alert'
        const txt=d<0?`VENCIDA há ${-d} dias`:d===0?'VENCE HOJE':`Vence em ${d} dias`
        alertas.push({cls,msg:`📋 Guia de <strong>${p.nome}</strong>: ${txt} (${p.guiaVenc.split('-').reverse().join('/')})`})
      }
    }
    // Laudo
    if(p.laudoVenc){
      const d=diasAte(p.laudoVenc)
      if(d!==null && d<=30){
        const cls=d<=7?'urgente':d<=15?'aviso':'ok-alert'
        const txt=d<0?`VENCIDO há ${-d} dias`:d===0?'VENCE HOJE':`Vence em ${d} dias`
        alertas.push({cls,msg:`📄 Laudo de <strong>${p.nome}</strong>: ${txt} (${p.laudoVenc.split('-').reverse().join('/')})`})
      }
    }
  })
  // Mostrar até 5 alertas
  alertas.slice(0,5).forEach((a,i)=>{
    const div=document.createElement('div')
    div.className='alert-item '+a.cls
    div.innerHTML=`${a.msg}<button class="alert-close" onclick="this.parentNode.remove()">✕</button>`
    banner.appendChild(div)
  })
  // Badge no menu pacientes
  const total=alertas.length
  const navPac=document.getElementById('nav-pacientes')
  if(navPac){
    const badge=navPac.querySelector('.badge-alerta')
    if(badge) badge.remove()
    if(total>0) navPac.innerHTML+=`<span class="badge-alerta">${total}</span>`
  }
}
function switchAgenda(id){currentAgendaId=id;showPage('agenda')}

// ─── RENDER AGENDA ────────────────────────────────────────────────────────────
function renderAgenda(){
  const ag=getAgenda()
  if(!ag) return '<p style="color:#6b7280;font-size:13px;padding:20px">Nenhuma agenda selecionada.</p>'

  // Legenda
  let html=`<div class="legend">
    <span style="font-weight:600;font-size:11px;color:#374151">Legenda:</span>
    <div class="legend-item"><div class="legend-dot" style="background:#1b5e20"></div> Unimed</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a5d6a7;border:1px solid #888"></div> Unimed Intercâmbio</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div> Particular</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c62828"></div> Falta</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00bcd4"></div> Almoço</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7b1fa2"></div> Reunião</div>
  </div>`

  // Obs da agenda
  if(ag.obs) html+=`<div style="background:#fffde7;border:1px solid #f9a825;border-radius:6px;padding:8px 12px;font-size:12px;color:#5f3f00;margin-bottom:10px">📝 <strong>Observação:</strong> ${ag.obs}</div>`

  // Calcular slots ativos
  const activeSlots = ag.activeSlots || [...SLOTS_SEG_SEX]
  const allSlots = [...new Set([...SLOTS_SEG_SEX, ...SLOTS_SAB])].filter(s=>activeSlots.includes(s)||SLOTS_SAB.includes(s))

  html+='<div class="wrap"><table><thead><tr><th class="hora-col">Horário</th>'
  DIAS_LABELS.forEach(d=>html+=`<th>${d}</th>`)
  html+='</tr></thead><tbody>'

  allSlots.forEach(slot=>{
    const isOnlysSab = !SLOTS_SEG_SEX.includes(slot)
    // Pular slots seg-sex desativados (mas manter sábado)
    if(SLOTS_SEG_SEX.includes(slot) && !activeSlots.includes(slot)) return

    html+=`<tr><td class="hora-cell">${slot}</td>`
    for(let di=0;di<6;di++){
      if(isOnlysSab && di<5){html+='<td class="bloqueado"></td>';continue}
      const val=(ag.slots&&ag.slots[slot]?ag.slots[slot][di]:'')||''
      const type=getType(val)
      if(type==='bloqueado') html+=`<td class="bloqueado"></td>`
      else if(type==='almoco') html+=`<td class="almoco">${val.slice(7)||'ALMOÇO'}</td>`
      else if(type==='reuniao') html+=`<td class="reuniao">${val.slice(8)||'REUNIÃO'}</td>`
      else if(type==='paciente'){
        const {nome,conv,falta,obs}=parsePac(val)
        const cls=pacCssClass(conv,falta)
        const obsDot=obs?'<span class="obs-dot" title="'+obs+'"></span>':''
        html+=`<td class="${cls} paciente-cell" onclick="openCellModal('${slot.replace(/'/g,"\\'")}',${di})">
          <span>${nome}${obsDot}</span>
          <span class="conv">${conv}</span>
        </td>`
      } else {
        html+=`<td class="vazio" onclick="openCellModal('${slot.replace(/'/g,"\\'")}',${di})"></td>`
      }
    }
    html+='</tr>'
  })
  html+='</tbody></table></div>'
  return html
}

// ─── RENDER PACIENTES ─────────────────────────────────────────────────────────
function renderPacientes(filter=''){
  const filtered=pacientes.filter(p=>
    p.nome.toLowerCase().includes(filter.toLowerCase())||
    (p.convenio||'').toLowerCase().includes(filter.toLowerCase())
  )
  const colors=['#1565c0','#6a1b9a','#b71c1c','#00695c','#e65100','#4e342e']
  let html=`<input class="search-bar" placeholder="Buscar por nome ou convênio..." oninput="filterPats(this.value)" value="${filter}">`
  if(!filtered.length) return html+'<p style="color:#6b7280;font-size:13px">Nenhum paciente encontrado.</p>'
  filtered.forEach((p,i)=>{
    const ini=p.nome.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase()
    const col=colors[i%colors.length]
    const convBg=p.convenio==='Particular'?'#e3f2fd':p.convenio==='Unimed Intercâmbio'?'#f1f8e9':'#e8f5e9'
    const convCol=p.convenio==='Particular'?'#0d47a1':p.convenio==='Unimed Intercâmbio'?'#33691e':'#1b5e20'
    html+=`<div class="pat-card" onclick="openPatModal(${p.id})">
      <div class="av" style="background:${col}22;color:${col}">${ini}</div>
      <div class="pat-info"><h4>${p.nome}</h4><p>${p.telefone||''}${p.nascimento?' · '+p.nascimento.split('-').reverse().join('/'):''}</p></div>
      <span class="conv-badge" style="background:${convBg};color:${convCol}">${p.convenio||''}</span>
    </div>`
  })
  return html
}
function filterPats(v){document.getElementById('content').innerHTML=renderPacientes(v)}

// ─── SHOW PAGE ────────────────────────────────────────────────────────────────
function showPage(page){

  document.getElementById('nav-'+page)?.classList.add('active')
  const ag=getAgenda()
  document.getElementById('page-title').textContent=
    page==='agenda'?(ag?.nome||'Agenda'):

  if(page==='agenda'){
    acts.innerHTML=`

function toggleCellType(v){
  document.getElementById('pat-fields').style.display=v==='paciente'?'':'none'
  document.getElementById('event-fields').style.display=v==='paciente'?'none':''
}
function fillFromPat(v){
  if(!v)return
  const p=v.split('|')
  document.getElementById('m-name').value=p[0]||''
  const s=document.getElementById('m-conv')
  for(let o of s.options) if(o.value===p[1]){o.selected=true;break}
}

function saveCell(){
  const ag=getAgenda();if(!ag||!editingCell)return
  const{slot,di}=editingCell
  if(!ag.slots) ag.slots={}
  if(!ag.slots[slot]) ag.slots[slot]=['','','','','','bloqueado']
  const type=document.getElementById('m-type').value
  if(type==='vazio') ag.slots[slot][di]=''
  else if(type==='almoco') ag.slots[slot][di]='almoco:'+(document.getElementById('m-event').value||'ALMOÇO')
  else if(type==='reuniao') ag.slots[slot][di]='reuniao:'+(document.getElementById('m-event').value||'REUNIÃO')
  else{
    const n=document.getElementById('m-name').value.trim()
    if(!n){alert('Digite o nome do paciente');return}
    const c=document.getElementById('m-conv').value
    const falta=document.getElementById('m-falta').checked
    const obs=document.getElementById('m-obs').value
    ag.slots[slot][di]=buildPacVal(n,c,falta,obs)
  }
  saveData();closeModal();showPage('agenda')
}
function clearCell(){
  const ag=getAgenda();if(!ag||!editingCell)return
  ag.slots[editingCell.slot][editingCell.di]=''
  saveData();closeModal();showPage('agenda')
}

// Estado temporário dos slots no modal
let _tempSlots = null
function toggleSlot(s){
  const btn=document.getElementById('st-'+s.replace(/[^a-z0-9]/gi,'_'))
  const isOn=btn.classList.contains('on')
  btn.classList.toggle('on',!isOn)
  btn.classList.toggle('off',isOn)
  btn.textContent=isOn?'✗':'✓'
  btn.nextSibling.textContent=isOn?' Bloqueado':' Ativo'
}

function selectCor(c){
  document.getElementById('ag-cor').value=c
  document.querySelectorAll('.color-swatch').forEach(el=>{
    el.classList.toggle('selected',el.style.background===c||el.style.backgroundColor===c)
  })
}

function saveAgenda(id){
  const nome=document.getElementById('ag-nome').value.trim()
  const cor=document.getElementById('ag-cor').value
  const obs=document.getElementById('ag-obs').value.trim()
  const especialidade=document.getElementById('ag-esp').value
  if(!nome){alert('Digite o nome');return}

  const allPossible=[...new Set([...SLOTS_SEG_SEX,...SLOTS_SAB])]
  const activeSlots=allPossible.filter(s=>{
    const btn=document.getElementById('st-'+s.replace(/[^a-z0-9]/gi,'_'))
    return btn&&btn.classList.contains('on')
  })

  if(id){
    const i=agendas.findIndex(a=>a.id===id)
    agendas[i].nome=nome;agendas[i].cor=cor;agendas[i].obs=obs;agendas[i].activeSlots=activeSlots;agendas[i].especialidade=especialidade
  } else {
    const slots={}
    SLOTS_SEG_SEX.forEach(sl=>{slots[sl]=['','','','','','bloqueado']})
    SLOTS_SAB.forEach(sl=>{if(!slots[sl])slots[sl]=['','','','','','bloqueado']})
    slots['12h - 13h']=['almoco:ALMOÇO','almoco:ALMOÇO','almoco:ALMOÇO','almoco:ALMOÇO','almoco:ALMOÇO','bloqueado']
    agendas.push({id:nextAgendaId++,nome,cor,obs,especialidade,activeSlots,slots})
  }
  saveData();closeModal();showPage('agendas')
}

function deleteAgenda(id){
  if(agendas.length<=1){alert('Mantenha ao menos uma agenda.');return}
  if(confirm('Remover esta agenda e todos os agendamentos?')){
    agendas=agendas.filter(a=>a.id!==id)
    if(currentAgendaId===id) currentAgendaId=agendas[0].id
    saveData();closeModal();showPage('agendas')
  }
}

    h2{font-size:13px;margin-bottom:6px}
    table{border-collapse:collapse;width:100%}
